hardware_node:
  ros__parameters:
    can_interface: "can0"

    motor_ids: [1, 2]

    operate_modes: ["speed", "speed"] #current, speed, position

    current_min: [-0.5, -0.5] #A
    current_max: [0.5, 0.5]

    speed_min: [-90.0, -90.0] #RPM
    speed_max: [90.0, 90.0]
    speed_deadzone: [5.0, 5.0]

    position_min: [-120.0, -120.0] #degree
    position_max: [120.0, 120.0]
    position_omega_max: [30.0, 30.0] #RPM

