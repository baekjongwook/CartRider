hardware_node:
  ros__parameters:
    can_interface: "can0"

    motor_ids: [3, 4]

    operate_modes: ["position", "position"] #current, speed, position

    current_min: [-0.5, -0.5] #A
    current_max: [0.5, 0.5]

    speed_min: [-25.0, -25.0] #RPM
    speed_max: [25.0, 25.0]
    speed_deadzone: [4.0, 4.0]

    position_min: [-75.0, -75.0] #degree
    position_max: [60.0, 60.0]
    position_zero_offset: [295.0, 290.0]

    pole_pairs: [4, 4]
    gear_ratios: [35.0, 35.0]

