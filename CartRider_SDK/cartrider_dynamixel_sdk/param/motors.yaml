/**:
  ros__parameters:
    dynamixel_serial_port: "/dev/rs485_rear_dynamixel"
    dynamixel_baudrate: 1000000

    dynamixel_motor_ids: [1, 2]

    dynamixel_position_min: [0.0, 0.0]
    dynamixel_position_max: [1023.0, 1023.0]
    dynamixel_position_omega_max: [1023.0, 1023.0]

    dynamixel_initial_position: [512.0, 512.0]

    dynamixel_torque_enable_at_start: true
    dynamixel_state_publish_rate_hz: 20.0